name: Windows Installer Test

on:
  push:
    branches: [main]
    paths:
      - 'Setup_Windows.bat'
      - 'setup/**'
      - '.gitattributes'
  workflow_dispatch:

jobs:
  test-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1. Verify CRLF line endings (bat + ps1 must be CRLF or cmd chokes)
      # ------------------------------------------------------------------
      - name: Verify CRLF line endings
        shell: pwsh
        run: |
          $failed = $false
          foreach ($f in @('Setup_Windows.bat', 'setup\setup.ps1')) {
            $bytes = [IO.File]::ReadAllBytes("$PWD\$f")
            $bareLF = 0
            for ($i = 0; $i -lt $bytes.Length; $i++) {
              if ($bytes[$i] -eq 10 -and ($i -eq 0 -or $bytes[$i-1] -ne 13)) { $bareLF++ }
            }
            if ($bareLF -gt 0) { Write-Error "$f has $bareLF bare LF line endings"; $failed = $true }
            else { Write-Host "$f : CRLF OK" }
          }
          if ($failed) { exit 1 }

      # ------------------------------------------------------------------
      # 2. Parse-check setup.ps1 (catches syntax errors before running)
      # ------------------------------------------------------------------
      - name: Syntax-check setup.ps1
        shell: pwsh
        run: |
          $errs = $null
          [void][Management.Automation.Language.Parser]::ParseFile(
            "$PWD\setup\setup.ps1", [ref]$null, [ref]$errs)
          if ($errs) {
            $errs | ForEach-Object { Write-Error "L$($_.Extent.StartLineNumber): $($_.Message)" }
            exit 1
          }
          Write-Host "setup.ps1 syntax OK"

      # ------------------------------------------------------------------
      # 3. Static analysis of Setup_Windows.bat
      #    Runtime execution via PowerShell pipe is unreliable (encoding/
      #    buffering quirks). Instead, parse the file statically to catch
      #    the two known cmd.exe failure modes:
      #      a) :: comments inside parenthesized blocks  (causes parse error)
      #      b) :: inside quoted strings in nested blocks (same effect)
      # ------------------------------------------------------------------
      - name: Static-check Setup_Windows.bat
        shell: pwsh
        run: |
          $lines = [IO.File]::ReadAllLines("$PWD\Setup_Windows.bat")
          $depth = 0
          $failed = $false
          for ($i = 0; $i -lt $lines.Count; $i++) {
            $ln = $lines[$i]
            $stripped = $ln.TrimStart()
            # track paren depth (skip comment lines)
            if (-not $stripped.StartsWith("::") -and -not $stripped.StartsWith("rem ")) {
              $depth += ($ln.ToCharArray() | Where-Object { $_ -eq '(' }).Count
              $depth -= ($ln.ToCharArray() | Where-Object { $_ -eq ')' }).Count
            }
            # flag :: inside a block (not a top-level label)
            if ($depth -gt 0 -and $stripped -match '^::') {
              Write-Error "Line $($i+1): '::' comment inside parenthesized block (depth=$depth) — use 'rem' instead: $stripped"
              $failed = $true
            }
            # flag :: inside a quoted string within a block
            if ($depth -gt 0 -and $ln -match '"[^"]*::[^"]*"') {
              Write-Error "Line $($i+1): '::' inside quoted string in block (depth=$depth) — cmd.exe parser bug: $($ln.Trim())"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "Setup_Windows.bat static check OK (no :: inside blocks)"

      # ------------------------------------------------------------------
      # 4. Run full setup.ps1 end-to-end (sales variant, non-interactive)
      #    Read-Host returns empty string when stdin is at EOF -> hits all defaults:
      #      company      -> servicenow (built-in default)
      #      webhook      -> skip
      #      role         -> AE (default)
      #      types        -> all
      #      automation   -> empty doesn't match ^[yY] -> skipped
      # ------------------------------------------------------------------
      - name: Run setup.ps1 end-to-end
        shell: pwsh
        env:
          ALFRED_VARIANT: sales
        run: |
          "" | pwsh -ExecutionPolicy Bypass -File setup\setup.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "setup.ps1 exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      # ------------------------------------------------------------------
      # 5. Verify Alfred.bat was written with CRLF
      #    (generated by setup.ps1 here-string - must also be CRLF)
      # ------------------------------------------------------------------
      - name: Verify Alfred.bat CRLF
        shell: pwsh
        run: |
          $batPath = [Environment]::GetFolderPath("Desktop") + "\Alfred.bat"
          if (-not (Test-Path $batPath)) { Write-Error "Alfred.bat not on Desktop"; exit 1 }
          $bytes = [IO.File]::ReadAllBytes($batPath)
          $bareLF = 0
          for ($i = 0; $i -lt $bytes.Length; $i++) {
            if ($bytes[$i] -eq 10 -and ($i -eq 0 -or $bytes[$i-1] -ne 13)) { $bareLF++ }
          }
          if ($bareLF -gt 0) {
            Write-Error "Alfred.bat has $bareLF bare LF endings - will crash when double-clicked"
            exit 1
          }
          Write-Host "Alfred.bat CRLF OK"

      # ------------------------------------------------------------------
      # 6. Verify Claude Desktop config is valid JSON with alfred entry
      # ------------------------------------------------------------------
      - name: Verify Claude Desktop config
        shell: pwsh
        run: |
          $cfg = "$env:APPDATA\Claude\claude_desktop_config.json"
          if (-not (Test-Path $cfg)) { Write-Error "claude_desktop_config.json not found"; exit 1 }
          $json = Get-Content $cfg -Raw | ConvertFrom-Json
          if (-not $json.mcpServers.alfred) { Write-Error "alfred MCP entry missing from config"; exit 1 }
          Write-Host "Claude Desktop config OK"
          Write-Host "  node : $($json.mcpServers.alfred.command)"
          Write-Host "  script: $($json.mcpServers.alfred.args[0])"
