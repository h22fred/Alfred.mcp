name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-fund

      - name: TypeScript build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify dist structure
        shell: bash
        run: |
          for f in dist/sc/index.js dist/sales/index.js; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
            echo "OK: $f"
          done
